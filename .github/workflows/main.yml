name: Radyoloji Pulse güncelle

on:
  schedule:
    - cron: "0 6 * * *"      # her gün 06:00 UTC (~09:00 TR)
  workflow_dispatch:           # elle de tetiklenebilir

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Makaleleri çek ve skorla
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}   # Settings > Secrets'a ekle (opsiyonel)
          NCBI_EMAIL:   ${{ secrets.NCBI_EMAIL }}      # opsiyonel
        run: python fetch_articles.py

      - name: Değişiklikleri commit'le
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data.json güncellendi $(date -u +%Y-%m-%d)"
          git push
