<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radyoloji Pulse — Makale Radarı</title>
<meta name="description" content="Son günlerin radyoloji literatürü, etki skoruyla sıralı. Kaynak: PubMed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- Açık tema: açık arka plan, koyu okunur yazı ---- */
    --bg:#eef2f6; --bg2:#e3e9ef; --panel:#ffffff; --panel2:#f6f9fb;
    --line:#d6dee6; --line2:#c2cdd8;
    --text:#0f1d2e;            /* koyu, yüksek kontrast */
    --muted:#3b4b5b;           /* ikincil metin — okunur */
    --faint:#64748b;           /* etiket/ipucu */
    --accent:#0e8aa0;          /* teal — beyaz üzerinde okunur */
    --accent-dim:#bfe9f1;      /* açık teal dolgu */
    --gold:#a86a12;            /* Tier 1 — beyaz üzerinde okunur */
    --gold-dim:#e6c074;
    --t2:#0e8aa0; --t3:#7488a0;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --r:10px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--bg);color:var(--text);font-family:var(--body);
    line-height:1.5;font-size:15px;
    background-image:radial-gradient(1100px 520px at 85% -12%, #d9eef3 0%, transparent 60%);
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px}

  /* ---------- Header ---------- */
  header{padding:40px 0 0}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{
    font-family:var(--display);font-weight:700;font-size:clamp(28px,6vw,44px);
    letter-spacing:-.02em;margin:0;line-height:1;
  }
  .brand h1 .accent{color:var(--accent)}
  .brand .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--faint);
    text-transform:uppercase;
  }
  /* LIVE rozeti — canlı his */
  .live{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#c01818;
    border:1px solid #e7b4b4;background:#fdecec;padding:5px 11px;border-radius:999px}
  .live .dot{width:8px;height:8px;border-radius:50%;background:#e0241b;
    box-shadow:0 0 0 0 rgba(224,36,27,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(224,36,27,.55)}
    70%{box-shadow:0 0 0 9px rgba(224,36,27,0)}
    100%{box-shadow:0 0 0 0 rgba(224,36,27,0)}
  }
  .tagline{color:var(--muted);margin:14px 0 0;max-width:54ch}
  /* signature: window/level grayscale ramp */
  .ramp{height:6px;margin:20px 0 0;border-radius:3px;
    background:linear-gradient(90deg,#0f1d2e,#5b6b7a 40%,#aab8c4 70%,#fff);
    box-shadow:inset 0 0 0 1px var(--line);}
  .stats{display:flex;gap:26px;flex-wrap:wrap;margin:22px 0 0;
    padding:16px 0 0;border-top:1px solid var(--line)}
  .stat .n{font-family:var(--display);font-weight:600;font-size:24px;line-height:1;color:var(--text)}
  .stat .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint);margin-top:6px}
  .stat.gold .n{color:var(--gold)}

  /* ---------- Controls ---------- */
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    margin:30px 0 18px;position:sticky;top:0;z-index:5;
    padding:14px 0;background:linear-gradient(var(--bg) 78%,transparent)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    padding:7px 13px;border-radius:999px;border:1px solid var(--line2);
    background:var(--panel);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--text)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);
    color:#ffffff;font-weight:600}
  .chip.best{border-color:var(--gold-dim);color:#8a5310}
  .chip.best[aria-pressed="true"]{background:var(--gold);border-color:var(--gold);color:#3a2606}
  .search{flex:1;min-width:180px}
  .search input{width:100%;font-family:var(--body);font-size:14px;color:var(--text);
    background:var(--panel);border:1px solid var(--line2);border-radius:999px;
    padding:9px 16px;outline:none;transition:.15s}
  .search input:focus{border-color:var(--accent)}
  .search input::placeholder{color:var(--faint)}

  /* ---------- Worklist ---------- */
  .list{display:flex;flex-direction:column;gap:14px;padding-bottom:60px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--t3);border-radius:var(--r);padding:18px 20px 16px;
    box-shadow:0 1px 2px rgba(15,29,46,.05);
    transition:transform .15s,border-color .15s,box-shadow .15s;animation:rise .4s both}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,29,46,.10);border-left-color:var(--accent)}
  .card.t1{border-left-color:var(--gold)}
  .card.t2{border-left-color:var(--t2)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .top{display:flex;gap:14px;align-items:flex-start}
  .rank{font-family:var(--mono);font-size:13px;color:var(--faint);
    padding-top:2px;min-width:30px;font-weight:500}
  .head{flex:1;min-width:0}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border-radius:5px;
    margin-bottom:9px;border:1px solid}
  .badge.t1{color:#8a5310;border-color:var(--gold-dim);background:#fdf3df}
  .badge.t2{color:#0b6e80;border-color:#bfe7ee;background:#e6f7fa}
  .badge.t3{color:#475569;border-color:#cfd8e1;background:#eef2f6}
  .title{font-family:var(--display);font-weight:600;font-size:18px;
    letter-spacing:-.01em;line-height:1.3;margin:0;color:var(--text)}
  .title a:hover{color:var(--accent)}
  .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin:9px 0 0;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .meta .j{color:var(--accent)}
  .meta .dot{color:var(--faint)}
  .meta .if{color:#8a5310;font-weight:600}
  .authors{color:var(--faint);font-size:13px;margin:8px 0 0}
  .ptypes{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 0}
  .pt{font-family:var(--mono);font-size:10.5px;color:var(--muted);
    padding:2px 7px;border:1px solid var(--line2);border-radius:4px;background:var(--panel2)}

  /* ---------- Özet + çeviri ---------- */
  .abstract{margin:12px 0 0;max-height:0;overflow:hidden;transition:max-height .25s ease}
  .abstract.open{max-height:2400px}
  .abs-langbar{display:flex;gap:6px;margin:0 0 8px}
  .lang{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;
    padding:3px 10px;border-radius:999px;border:1px solid var(--line2);
    background:var(--panel2);color:var(--muted);cursor:pointer;transition:.15s}
  .lang:hover{border-color:var(--accent);color:var(--text)}
  .lang.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .abs-body{font-size:13.5px;color:var(--muted);line-height:1.65}
  .absnote{color:var(--faint);font-style:italic}
  .abs-fallback{display:inline-block;margin-top:8px;color:var(--accent);font-size:12px;text-decoration:underline}
  .toggle{font-family:var(--mono);font-size:11px;color:var(--accent);
    background:none;border:none;cursor:pointer;padding:10px 0 0;letter-spacing:.05em}
  .toggle:hover{text-decoration:underline}

  /* score gauge — signal intensity bar */
  .gauge{display:flex;align-items:center;gap:10px;margin:14px 0 0}
  .bar{flex:1;height:5px;border-radius:3px;background:var(--bg2);
    border:1px solid var(--line);overflow:hidden}
  .fill{height:100%;border-radius:3px;
    background:linear-gradient(90deg,var(--accent-dim),var(--accent))}
  .card.t1 .fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
  .sval{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:42px;text-align:right}

  /* states */
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .state h3{font-family:var(--display);color:var(--text);font-weight:600}
  .state code{font-family:var(--mono);font-size:12px;background:var(--panel);
    padding:3px 7px;border-radius:5px;border:1px solid var(--line2);color:var(--accent)}

  .loadbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 0}
  .loadbar .hint{font-family:var(--mono);font-size:11px;color:var(--faint)}

  footer{border-top:1px solid var(--line);padding:26px 0 50px;margin-top:20px;
    color:var(--faint);font-size:13px;display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:10px}
  footer a:hover{color:var(--accent)}

  @media (max-width:560px){
    .stats{gap:20px}
    .rank{min-width:24px;font-size:12px}
    .title{font-size:16.5px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand" style="width:100%;justify-content:space-between">
      <span class="eyebrow">Makale Radarı</span>
      <span class="live"><span class="dot"></span>LIVE</span>
    </div>
    <div class="brand" style="margin-top:6px">
      <h1>Radyoloji <span class="accent">Pulse</span></h1>
    </div>
    <p class="tagline">Radyoloji alanında güncel ve yenilenen literatür derlemesi.</p>
    <div class="ramp" aria-hidden="true"></div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="controls">
    <div class="chips" id="chips">
      <button class="chip" data-tier="all" aria-pressed="true">Tümü</button>
      <button class="chip" data-tier="1" aria-pressed="false">Tier 1</button>
      <button class="chip" data-tier="2" aria-pressed="false">Tier 2</button>
      <button class="chip" data-tier="3" aria-pressed="false">Tier 3</button>
      <button class="chip best" data-tier="best" aria-pressed="false">★ Best 2026</button>
    </div>
    <div class="search">
      <input id="q" type="search" placeholder="Başlık, dergi veya yazarda ara…" autocomplete="off">
    </div>
  </div>

  <main class="list" id="list">
    <div class="state"><h3>Yükleniyor…</h3></div>
  </main>

  <footer>
    <span>Kaynak: <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank" rel="noopener">PubMed</a>
      · Her gün otomatik güncellenir · Çeviri: Google Translate</span>
    <span id="updated"></span>
  </footer>
</div>

<script>
const state = { data:null, best:null, tier:"all", q:"" };
const TR_CACHE = {};   // pmid -> çevrilmiş özet (oturum içi önbellek)

function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function fmtDate(iso){
  if(!iso) return "";
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return iso;
  const months=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  return `${parseInt(m[3])} ${months[parseInt(m[2])-1]} ${m[1]}`;
}
function authorLine(a){
  if(!a||!a.length) return "";
  if(a.length<=3) return a.join(", ");
  return a.slice(0,3).join(", ") + " ve diğerleri";
}
function articleUrl(a){
  if(a.doi) return "https://doi.org/"+a.doi;
  if(a.pmid) return "https://pubmed.ncbi.nlm.nih.gov/"+a.pmid+"/";
  return "#";
}

/* Tarayıcıda otomatik çeviri (Google'ın anahtarsız uç noktası).
   Uzun metni cümle sınırından parçalara böler. */
async function gtxTranslate(text){
  const chunks = [];
  let s = text;
  while(s.length > 4500){
    let cut = s.lastIndexOf(". ", 4500);
    if(cut < 1000) cut = 4500;
    chunks.push(s.slice(0, cut+1));
    s = s.slice(cut+1);
  }
  chunks.push(s);
  let out = "";
  for(const c of chunks){
    const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=tr&dt=t&q=" + encodeURIComponent(c);
    const r = await fetch(url);
    if(!r.ok) throw new Error("translate " + r.status);
    const j = await r.json();
    out += (j[0] || []).map(x => x[0]).join("");
  }
  return out;
}

function renderStats(d){
  const wd = document.getElementById("window-days");
  if(wd) wd.textContent = d.window_days ?? 7;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${d.count||0}</div><div class="l">Makale</div></div>
    <div class="stat gold"><div class="n">${d.tier1_count||0}</div><div class="l">Tier 1</div></div>
    <div class="stat"><div class="n">${d.window_days||7}</div><div class="l">Gün</div></div>`;
  if(d.updated){
    const dt = new Date(d.updated);
    document.getElementById("updated").textContent =
      "Güncellendi: " + dt.toLocaleString("tr-TR",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
  }
}

function card(a, rank){
  const t = a.tier||3;
  const width = Math.max(6, Math.min(100, a.score/1.7));
  const tagged = (a.pubtypes||[]).filter(p=>p!=="Journal Article").slice(0,4);
  const tags = tagged.map(p=>`<span class="pt">${escapeHtml(p)}</span>`).join("");
  const pmid = a.pmid || ("r"+rank);
  const trText = a.abstract_tr || TR_CACHE[pmid] || "";
  const hasTr = !!(trText && trText.trim());
  const abs = a.abstract ? `
      <div class="abstract" id="abs-${rank}">
        <div class="abs-langbar">
          <button class="lang on" data-l="tr" data-r="${rank}">Türkçe</button>
          <button class="lang" data-l="en" data-r="${rank}">English</button>
        </div>
        <div class="abs-body tr" id="abstr-${rank}">${hasTr ? escapeHtml(trText) : '<span class="absnote">Açınca otomatik çevrilecek…</span>'}</div>
        <div class="abs-body en" id="absen-${rank}" hidden>${escapeHtml(a.abstract)}</div>
      </div>
      <button class="toggle" data-abs="${rank}" data-pmid="${escapeHtml(pmid)}" data-has-tr="${hasTr?1:0}">Özeti göster +</button>` : "";
  return `
  <article class="card t${t}">
    <div class="top">
      <div class="rank">#${rank}</div>
      <div class="head">
        <span class="badge t${t}">Tier ${t}</span>
        <h2 class="title"><a href="${articleUrl(a)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a></h2>
        <div class="meta">
          <span class="j">${escapeHtml(a.journal||"")}</span>
          <span class="dot">·</span><span>${fmtDate(a.date)}</span>
          ${a.impact?`<span class="dot">·</span><span class="if">IF ${a.impact}</span>`:""}
          ${a.pmid?`<span class="dot">·</span><a href="https://pubmed.ncbi.nlm.nih.gov/${a.pmid}/" target="_blank" rel="noopener">PMID ${a.pmid}</a>`:""}
        </div>
        ${authorLine(a.authors)?`<div class="authors">${escapeHtml(authorLine(a.authors))}</div>`:""}
        ${tags?`<div class="ptypes">${tags}</div>`:""}
        <div class="gauge"><div class="bar"><div class="fill" style="width:${width}%"></div></div>
          <span class="sval">${a.score}</span></div>
        ${abs}
      </div>
    </div>
  </article>`;
}

async function doTranslate(btn){
  if(btn.dataset.done === "1") return;
  btn.dataset.done = "1";
  const rank = btn.dataset.abs;
  const trEl = document.getElementById("abstr-"+rank);
  const enText = document.getElementById("absen-"+rank).textContent;
  trEl.innerHTML = '<span class="absnote">Çevriliyor…</span>';
  try{
    const tr = await gtxTranslate(enText);
    TR_CACHE[btn.dataset.pmid] = tr;
    trEl.textContent = tr;
  }catch(e){
    const link = "https://translate.google.com/?sl=en&tl=tr&op=translate&text=" + encodeURIComponent(enText);
    trEl.innerHTML = '<span class="absnote">Otomatik çeviri şu an yapılamadı.</span> ' +
      '<a class="abs-fallback" target="_blank" rel="noopener" href="' + link + '">Google Translate’te aç →</a>';
    btn.dataset.done = "0";   // tekrar denenebilsin
  }
}

async function loadBest(){
  if(state.best) return;
  try{
    const res = await fetch("best2026.json",{cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    state.best = await res.json();
  }catch(e){
    state.best = {articles:[]};
  }
}

function render(){
  const isBest = state.tier==="best";
  const src = isBest ? state.best : state.data;
  const list = document.getElementById("list");
  if(!src){
    if(isBest) list.innerHTML = `<div class="state"><h3>Best of 2026 yükleniyor…</h3></div>`;
    return;
  }
  let arts = (src.articles||[]).slice();
  // Best görünümü zaten etki faktörüne göre sıralı; Tier filtreleri yalnız ana akışta
  if(!isBest && state.tier!=="all") arts = arts.filter(a=>String(a.tier)===state.tier);
  if(state.q){
    const q = state.q.toLowerCase();
    arts = arts.filter(a=>
      (a.title||"").toLowerCase().includes(q) ||
      (a.journal||"").toLowerCase().includes(q) ||
      (a.authors||[]).join(" ").toLowerCase().includes(q));
  }
  if(!arts.length){
    list.innerHTML = isBest
      ? `<div class="state"><h3>Best of 2026 henüz boş</h3>
         <p>Liste, betik her çalıştığında bu yılın en yüksek etki faktörlü makaleleriyle dolar.</p></div>`
      : `<div class="state"><h3>Eşleşen makale yok</h3>
         <p>Filtreyi değiştir ya da aramayı temizle.</p></div>`;
    return;
  }
  list.innerHTML = arts.map((a,i)=>card(a,i+1)).join("");

  // Özeti göster/gizle + açılınca otomatik çeviri
  list.querySelectorAll(".toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const el = document.getElementById("abs-"+btn.dataset.abs);
      const open = el.classList.toggle("open");
      btn.textContent = open ? "Özeti gizle −" : "Özeti göster +";
      if(open && btn.dataset.hasTr === "0") doTranslate(btn);
    });
  });

  // Dil değiştirme (Türkçe / English)
  list.querySelectorAll(".lang").forEach(b=>{
    b.addEventListener("click",()=>{
      const r = b.dataset.r, l = b.dataset.l;
      const box = document.getElementById("abs-"+r);
      box.querySelectorAll(".lang").forEach(x=>x.classList.toggle("on", x.dataset.l===l));
      document.getElementById("abstr-"+r).hidden = (l!=="tr");
      document.getElementById("absen-"+r).hidden = (l!=="en");
    });
  });
}

function bindControls(){
  document.querySelectorAll(".chip").forEach(c=>{
    c.addEventListener("click",async ()=>{
      document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed","false"));
      c.setAttribute("aria-pressed","true");
      state.tier = c.dataset.tier;
      if(state.tier==="best" && !state.best){
        document.getElementById("list").innerHTML = `<div class="state"><h3>Best of 2026 yükleniyor…</h3></div>`;
        await loadBest();
      }
      render();
    });
  });
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value.trim();render();});
}

function wireFileLoader(){
  const fi = document.getElementById("file");
  const btn = document.getElementById("loadbtn");
  if(!fi || !btn) return;
  btn.addEventListener("click", ()=>fi.click());
  fi.addEventListener("change", ev=>{
    const f = ev.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        state.data = JSON.parse(r.result);
        renderStats(state.data);
        render();
      }catch(e){ alert("Bu dosya geçerli bir data.json değil."); }
    };
    r.readAsText(f);
  });
}

async function load(){
  bindControls();
  try{
    const res = await fetch("data.json",{cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    state.data = await res.json();
    renderStats(state.data);
    render();
  }catch(err){
    const isFile = location.protocol === "file:";
    const msg = isFile
      ? `<p>Bu sayfa bilgisayardan doğrudan açıldığında tarayıcı, güvenlik nedeniyle
          <code>data.json</code>'u otomatik okuyamaz. İki seçenek:</p>
         <p>1) Aşağıdaki düğmeyle <code>data.json</code>'u elle seç.<br>
            2) Ya da siteyi GitHub Pages'te yayınla — orada otomatik çalışır.</p>`
      : `<p><code>data.json</code> bulunamadı. Önce şunu çalıştır:
         <code>python fetch_articles.py</code></p>`;
    document.getElementById("list").innerHTML = `
      <div class="state">
        <h3>Veri otomatik yüklenemedi</h3>
        ${msg}
        <div class="loadbar" style="justify-content:center">
          <button class="chip" id="loadbtn">data.json seç…</button>
